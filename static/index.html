<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CLI Agent — Web Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

  * { scrollbar-width: thin; scrollbar-color: #1e293b transparent; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }

  body { font-family: 'Inter', system-ui, sans-serif; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .animate-in { animation: slideUp 0.2s ease-out; }

  @keyframes pulse-dot {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.9); }
    40% { opacity: 1; transform: scale(1); }
  }
  .typing-dot { animation: pulse-dot 1.4s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, transparent 0%, rgba(16, 185, 129, 0.08) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 2.5s ease-in-out infinite;
  }

  .msg-content p { margin: 0.25em 0; }
  .msg-content code {
    background: #1e293b; padding: 1px 5px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 0.9em;
  }
  .msg-content pre {
    background: #0f172a; border: 1px solid #1e293b; border-radius: 8px;
    padding: 12px; overflow-x: auto; margin: 8px 0;
  }
  .msg-content pre code { background: transparent; padding: 0; }
</style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col">

<!-- ====== TOP NAV ====== -->
<header class="h-11 shrink-0 flex items-center justify-between px-4 border-b border-slate-800 bg-slate-950/90 backdrop-blur-md z-30">
  <div class="flex items-center gap-2.5">
    <div class="w-6 h-6 rounded bg-gradient-to-br from-emerald-500 to-emerald-700 flex items-center justify-center shadow-lg shadow-emerald-500/20">
      <i data-lucide="terminal" class="w-3.5 h-3.5 text-white"></i>
    </div>
    <h1 class="text-sm font-semibold tracking-tight">CLI Agent</h1>
    <span class="text-[10px] uppercase tracking-widest text-slate-600 px-2 py-0.5 rounded border border-slate-800">Rust/axum</span>
    <span class="text-[10px] text-sky-600 px-2 py-0.5 rounded border border-sky-800" id="modelBadge">—</span>
  </div>
  <div class="flex items-center gap-2">
    <a href="/" class="text-[10px] text-slate-500 hover:text-slate-300 transition-colors">
      <i data-lucide="refresh-cw" class="w-3 h-3 inline"></i>
    </a>
    <div id="connectionBadge" class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-medium bg-red-900/30 text-red-400 border border-red-800/40">
      <span class="w-1.5 h-1.5 rounded-full bg-red-400" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </div>
</header>

<!-- ====== MAIN ====== -->
<main class="flex-1 flex flex-col min-h-0">
  <!-- Messages -->
  <div id="messagesContainer" class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
    <div class="text-center py-12 text-slate-600 text-sm flex flex-col items-center gap-2">
      <i data-lucide="message-circle" class="w-8 h-8 text-slate-700"></i>
      <span>Начните диалог с агентом</span>
    </div>
  </div>

  <!-- Loading indicator -->
  <div id="loadingIndicator" class="hidden px-4 py-2 flex items-center gap-2 text-slate-500 text-xs">
    <div class="flex gap-1">
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 typing-dot"></span>
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 typing-dot"></span>
      <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 typing-dot"></span>
    </div>
    <span>Агент думает...</span>
  </div>

  <!-- Reconnecting overlay -->
  <div id="reconnectOverlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-40 flex items-center justify-center hidden">
    <div class="flex flex-col items-center gap-2 text-slate-400">
      <div class="flex gap-1">
        <span class="w-2 h-2 rounded-full bg-emerald-500 typing-dot"></span>
        <span class="w-2 h-2 rounded-full bg-emerald-500 typing-dot"></span>
        <span class="w-2 h-2 rounded-full bg-emerald-500 typing-dot"></span>
      </div>
      <span class="text-sm font-medium">Reconnecting...</span>
      <span class="text-xs text-slate-600">Attempt <span id="reconnectAttempt">1</span></span>
    </div>
  </div>
</main>

<!-- ====== PROMPT BAR ====== -->
<div class="shrink-0 flex justify-center pb-3 pt-2 bg-gradient-to-t from-slate-950 via-slate-950/95 to-transparent">
  <div class="w-full mx-4 sm:w-3/5 sm:mx-0 bg-slate-900 border border-slate-700/50 rounded-xl shadow-2xl shadow-black/30 p-2.5 flex items-end gap-2">
    <textarea id="promptInput" rows="1"
      class="flex-1 bg-transparent border-none text-sm text-slate-200 placeholder-slate-500 resize-none focus:outline-none leading-relaxed py-1.5 px-1.5 max-h-32"
      placeholder="Напишите сообщение... (Enter — отправить, Shift+Enter — новая строка)"></textarea>
    <button id="sendBtn"
      class="shrink-0 flex items-center justify-center px-3 py-2 rounded-lg text-sm font-semibold bg-gradient-to-r from-emerald-600 to-emerald-500 hover:from-emerald-500 hover:to-emerald-400 text-white shadow-lg shadow-emerald-500/20 transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed"
      disabled>
      <i data-lucide="send" class="w-4 h-4"></i>
    </button>
  </div>
</div>

<script>
// ========================================================================
//  UTILITY
// ========================================================================
function esc(str) { const d = document.createElement('div'); d.textContent = String(str ?? ''); return d.innerHTML; }
function time() { return new Date().toLocaleTimeString('ru-RU', { hour12: false }); }
function $(id) { return document.getElementById(id); }

// ========================================================================
//  UI REFS
// ========================================================================
const messagesContainer = $('messagesContainer');
const promptInput = $('promptInput');
const sendBtn = $('sendBtn');
const loadingIndicator = $('loadingIndicator');
const reconnectOverlay = $('reconnectOverlay');
const reconnectAttempt = $('reconnectAttempt');
const statusBadge = $('connectionBadge');
const statusDot = $('statusDot');
const statusText = $('statusText');
const modelBadge = $('modelBadge');

// ========================================================================
//  STATE
// ========================================================================
let ws = null;
let intentionalClose = false;
let reconnectAttemptCount = 0;
let reconnectTimer = null;
let isProcessing = false; // true while waiting for agent response
let history = [];
let historyPos = -1;

// ========================================================================
//  CONNECTION
// ========================================================================
function setConnected() {
  statusBadge.className = 'flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-medium bg-emerald-900/30 text-emerald-400 border border-emerald-800/40';
  statusDot.className = 'w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-emerald';
  statusText.textContent = 'Connected';
  reconnectOverlay.classList.add('hidden');
  sendBtn.disabled = false;
}

function setDisconnected(reconnecting) {
  const cls = reconnecting ? 'bg-amber-900/30 text-amber-400 border-amber-800/40' : 'bg-red-900/30 text-red-400 border-red-800/40';
  const dotCls = reconnecting ? 'bg-amber-400' : 'bg-red-400';
  const label = reconnecting ? 'Reconnecting...' : 'Disconnected';
  statusBadge.className = `flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[10px] font-medium ${cls}`;
  statusDot.className = `w-1.5 h-1.5 rounded-full ${dotCls}`;
  statusText.textContent = label;
  sendBtn.disabled = true;
}

function connectWS() {
  if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) return;
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const url = `${protocol}//${location.host}/ws`;
  ws = new WebSocket(url);

  ws.onopen = () => {
    reconnectAttemptCount = 0;
    setConnected();
    addSystemMessage('WebSocket подключён');
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      handleEvent(data);
    } catch (err) {
      addSystemMessage('Parse error: ' + err.message);
    }
  };

  ws.onclose = () => {
    if (!intentionalClose) {
      setDisconnected(true);
      startReconnect();
    }
  };

  ws.onerror = () => {};
}

function startReconnect() {
  if (reconnectTimer) return;
  reconnectAttemptCount++;
  reconnectAttempt.textContent = reconnectAttemptCount;
  reconnectOverlay.classList.remove('hidden');
  const delay = Math.min(1000 * Math.pow(2, reconnectAttemptCount - 1), 10000);
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connectWS();
  }, delay);
}

function disconnectWS() {
  intentionalClose = true;
  if (ws) { ws.close(); ws = null; }
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  setDisconnected(false);
  reconnectOverlay.classList.add('hidden');
}

// ========================================================================
//  RENDER
// ========================================================================
const ROLE_STYLES = {
  system:    { border: 'border-l-slate-500', label: 'System',    labelCls: 'text-slate-400' },
  user:      { border: 'border-l-blue-500',  label: 'User',      labelCls: 'text-blue-400' },
  assistant: { border: 'border-l-emerald-500', label: 'Assistant', labelCls: 'text-emerald-400' },
  tool:      { border: 'border-l-indigo-500', label: 'Tool',     labelCls: 'text-indigo-400' },
};

function addAssistantMessage(content, isStreaming) {
  removePlaceholder();

  let el = document.querySelector('.last-assistant');
  if (isStreaming && el) {
    // append to existing streaming message
    const msgDiv = el.querySelector('.msg-content');
    if (msgDiv) msgDiv.textContent += content;
    el.scrollIntoView({ behavior: 'smooth', block: 'end' });
    return;
  }

  el = document.createElement('div');
  el.className = `animate-in flex items-start gap-2.5 px-3 py-2.5 rounded-lg border border-slate-800/40 bg-slate-900/50 border-l-2 ${ROLE_STYLES.assistant.border} last-assistant`;

  const ts = document.createElement('span');
  ts.className = 'shrink-0 text-[10px] text-slate-600 mt-0.5 select-none';
  ts.textContent = time();

  const wrapper = document.createElement('div');
  wrapper.className = 'flex-1 min-w-0';

  const label = document.createElement('span');
  label.className = `text-[10px] uppercase tracking-wider font-semibold ${ROLE_STYLES.assistant.labelCls}`;
  label.textContent = isStreaming ? 'Assistant (streaming)' : 'Assistant';

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg-content text-sm text-slate-200 mt-0.5 leading-relaxed break-words';
  msgDiv.textContent = content;

  wrapper.appendChild(label);
  wrapper.appendChild(msgDiv);
  el.appendChild(ts);
  el.appendChild(wrapper);
  messagesContainer.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  renderIcons(el);
}

function addUserMessage(content) {
  removePlaceholder();

  const el = document.createElement('div');
  el.className = `animate-in flex items-start gap-2.5 px-3 py-2.5 rounded-lg border border-slate-800/40 bg-slate-900/50 border-l-2 ${ROLE_STYLES.user.border} ml-8 sm:ml-16`;

  const ts = document.createElement('span');
  ts.className = 'shrink-0 text-[10px] text-slate-600 mt-0.5 select-none';
  ts.textContent = time();

  const wrapper = document.createElement('div');
  wrapper.className = 'flex-1 min-w-0';

  const label = document.createElement('span');
  label.className = `text-[10px] uppercase tracking-wider font-semibold ${ROLE_STYLES.user.labelCls}`;
  label.textContent = 'You';

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg-content text-sm text-slate-200 mt-0.5 leading-relaxed break-words';
  msgDiv.textContent = content;

  wrapper.appendChild(label);
  wrapper.appendChild(msgDiv);
  el.appendChild(ts);
  el.appendChild(wrapper);
  messagesContainer.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  renderIcons(el);
}

function addToolMessage(toolName, result) {
  removePlaceholder();

  const el = document.createElement('div');
  el.className = `animate-in flex items-start gap-2.5 px-3 py-2.5 rounded-lg border border-slate-800/40 bg-slate-900/50 border-l-2 ${ROLE_STYLES.tool.border}`;

  const ts = document.createElement('span');
  ts.className = 'shrink-0 text-[10px] text-slate-600 mt-0.5 select-none';
  ts.textContent = time();

  const wrapper = document.createElement('div');
  wrapper.className = 'flex-1 min-w-0';

  const label = document.createElement('span');
  label.className = `text-[10px] uppercase tracking-wider font-semibold ${ROLE_STYLES.tool.labelCls}`;
  label.innerHTML = `<i data-lucide="wrench" class="w-3 h-3 inline -mt-0.5 mr-1"></i> ${esc(toolName)}`;

  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg-content text-sm text-slate-300 mt-0.5 leading-relaxed break-words';
  const resultText = result.length > 500 ? result.slice(0, 500) + '...' : result;
  msgDiv.textContent = resultText;

  wrapper.appendChild(label);
  wrapper.appendChild(msgDiv);
  el.appendChild(ts);
  el.appendChild(wrapper);
  messagesContainer.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  renderIcons(el);
}

function addSystemMessage(content) {
  removePlaceholder();

  const el = document.createElement('div');
  el.className = `animate-in flex items-start gap-2.5 px-3 py-2 rounded-lg border border-slate-800/40 bg-slate-900/30 border-l-2 ${ROLE_STYLES.system.border}`;

  const ts = document.createElement('span');
  ts.className = 'shrink-0 text-[10px] text-slate-600 mt-0.5 select-none';
  ts.textContent = time();

  const msgDiv = document.createElement('div');
  msgDiv.className = 'text-xs text-slate-400 mt-0.5';
  msgDiv.textContent = content;

  el.appendChild(ts);
  el.appendChild(msgDiv);
  messagesContainer.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  renderIcons(el);
}

function addStreamingProgress(content) {
  // Find the last assistant message with class last-assistant
  let last = messagesContainer.querySelector('.last-assistant');
  if (last) {
    const msgDiv = last.querySelector('.msg-content');
    if (msgDiv) msgDiv.textContent += content;
    last.scrollIntoView({ behavior: 'smooth', block: 'end' });
  } else {
    // fallback: create new message
    addAssistantMessage(content, false);
  }
}

function removePlaceholder() {
  const ph = messagesContainer.querySelector('.text-center.py-12');
  if (ph) ph.remove();
}

// ========================================================================
//  EVENT HANDLER
// ========================================================================
function handleEvent(data) {
  switch (data.type) {
    case 'agent_message':
      setLoading(false);
      if (data.content) addAssistantMessage(data.content, false);
      break;
    case 'tool_executing':
      addSystemMessage(`⚙️ Выполняется ${data.tool_name}...`);
      break;
    case 'tool_result':
      addToolMessage(data.tool_name || 'tool', data.result || '');
      break;
    case 'model_info':
      if (modelBadge && data.model_name) modelBadge.textContent = data.model_name;
      break;
    case 'ping':
      break;
    default:
      if (data && data.type) console.debug('Unknown event type:', data.type);
  }
}

// ========================================================================
//  LOADING STATE
// ========================================================================
function setLoading(loading) {
  isProcessing = loading;
  if (loading) {
    loadingIndicator.classList.remove('hidden');
    sendBtn.disabled = true;
    promptInput.disabled = true;
  } else {
    loadingIndicator.classList.add('hidden');
    sendBtn.disabled = false;
    promptInput.disabled = false;
    promptInput.focus();
  }
}

// ========================================================================
//  SEND
// ========================================================================
function sendMessage() {
  const text = promptInput.value.trim();
  if (!text || isProcessing) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    addSystemMessage('Ошибка: нет подключения к серверу');
    return;
  }

  ws.send(JSON.stringify({ type: 'start_task', prompt: text }));
  addUserMessage(text);
  setLoading(true);

  // History
  history.push(text);
  historyPos = history.length;
  promptInput.value = '';
  promptInput.style.height = 'auto';
}

// ========================================================================
//  LUCIDE ICONS
// ========================================================================
function renderIcons(root) {
  if (typeof lucide !== 'undefined' && lucide.createIcons) {
    lucide.createIcons({ attrs: { class: ['inline-block'] }, nameAttr: 'data-lucide', root: root || document.body });
  }
}

// ========================================================================
//  BOOTSTRAP
// ========================================================================
sendBtn.addEventListener('click', sendMessage);

promptInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  } else if (e.key === 'ArrowUp' && !e.shiftKey) {
    e.preventDefault();
    if (history.length > 0 && historyPos > 0) {
      historyPos--;
      promptInput.value = history[historyPos];
    }
  } else if (e.key === 'ArrowDown' && !e.shiftKey) {
    e.preventDefault();
    if (historyPos < history.length - 1) {
      historyPos++;
      promptInput.value = history[historyPos];
    } else {
      historyPos = history.length;
      promptInput.value = '';
    }
  }
});

// Auto-resize textarea
promptInput.addEventListener('input', () => {
  promptInput.style.height = 'auto';
  promptInput.style.height = Math.min(promptInput.scrollHeight, 132) + 'px';
});

renderIcons();
connectWS();
</script>
</body>
</html>
